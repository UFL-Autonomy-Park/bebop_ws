# differentiator_param.yaml

/vrpn_mocap/vrpn_mocap_client_node:
  ros__parameters:
    server: "192.168.1.201"
    port: 3883
    frame_id: odom
    update_freq: 100.
    refresh_freq: 1.
    multi_sensor: false
    use_vrpn_timestamps: false

/joy_node:
  ros__parameters:
    deadzone: 0.25
    autorepeat_rate: 20.0
    coalesce_interval_ms: 50

/bebop104/bebop_driver_node:
  ros__parameters:
    bebop_ip: "192.168.1.104"
    camera_calibration_file: "package://ros2_bebop_driver/config/bebop2_camera_calib.yaml"
    max_tilt_angle: 15.0
    max_rotation_speed: 200.0

/bebop104/bebop_teleop_node:
  ros__parameters:
    x_axis: 4
    y_axis: 3
    z_axis: 1
    yaw_axis: 0

    takeoff_button: 7 # START
    land_button: 6 # SELECT
    mode_button: 0 # A BUTTON

    x_vel_max: 1.0
    y_vel_max: 1.0
    z_vel_max: 1.0
    yaw_vel_max: 0.25

/bebop104/mocap_filters_node:
  ros__parameters:
    frames:
      parent: "odom"
      child: "bebop104/base_link"
    topics:
      input_pose: "/vrpn_mocap/bebop104/pose"
    frequency: 100.0 # Must be >= 0.0

    levant:
      C: 2.0

    rho:
      k1: 10.0
      k2: 10.0
      k3: 6.0
      alpha: 0.5

    kalman:
      Q_pos: 0.0001
      Q_vel: 0.1

    baseline:
      dirty_N: 20.0

    rushi_rho:
      alpha: 10.0
      beta: 10.0
      k: 6.0

/bebop104/figure_eight_node:
  ros__parameters:
    vert_offset: 1.0 # m
    update_rate: 50.0 # Hz
    tracking_kp_lat: 0.8 # for planar motion
    tracking_kp_vert: 1.0 # for up/down motion

/bebop104/bebop_control_node:
  ros__parameters:
    # Limits
    max_tilt_deg: 15.0
    max_vert_speed: 1.0

    # Gains (Body Frame)
    kp_xy: 0.15 # ENU
    ki_xy: 0.006 # ENU
    kd_xy: 0.002 # ENU

    update_rate: 50.0 # Control loop frequency in Hz
    cutoff_frequency: 8.0 # Dirty derivative cutoff frequency in Hz

    # Topics
    odom_topic: "filtered_odom/rho"
    des_vel_topic: "cmd_vel_des"
    cmd_vel_topic: "cmd_vel"
    bebop_mode_topic: "mode"

/ncr_lab_viz/ncr_lab_viz_node:
  ros__parameters:
    border_x: [-2.7432, 2.7432, 2.7432, -2.7432]
    border_z: [-7.3152, -7.3152, 6.096, 6.096]
